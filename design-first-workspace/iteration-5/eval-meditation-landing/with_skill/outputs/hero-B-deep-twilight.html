<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant B: Deep Twilight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #1a1525;
      --color-surface: #231e30;
      --color-text: #d4cde0;
      --color-heading: #f0eaf8;
      --color-accent: #9b7fd4;
      --color-accent-glow: rgba(155,127,212,0.3);
      --color-muted: #8a7ea0;
      --color-cta-bg: linear-gradient(135deg, #9b7fd4 0%, #7a5fb8 100%);
      --font-heading: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 24px 40px;
      overflow: hidden;
    }

    /* Animated gradient background */
    .hero__bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(155,127,212,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(100,70,160,0.1) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 20% 90%, rgba(80,50,140,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Stars / particles */
    .hero__stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero__star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(200,180,240,0.6);
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    .hero__star:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
    .hero__star:nth-child(2) { top: 25%; left: 75%; animation-delay: 0.8s; width: 3px; height: 3px; }
    .hero__star:nth-child(3) { top: 60%; left: 10%; animation-delay: 1.5s; }
    .hero__star:nth-child(4) { top: 40%; left: 85%; animation-delay: 0.3s; width: 1.5px; height: 1.5px; }
    .hero__star:nth-child(5) { top: 70%; left: 60%; animation-delay: 2s; }
    .hero__star:nth-child(6) { top: 10%; left: 50%; animation-delay: 1s; width: 2.5px; height: 2.5px; }
    .hero__star:nth-child(7) { top: 80%; left: 30%; animation-delay: 0.5s; }
    .hero__star:nth-child(8) { top: 50%; left: 45%; animation-delay: 1.8s; width: 1px; height: 1px; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .hero__content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    .hero__symbol {
      width: 48px;
      height: 48px;
      margin: 0 auto 32px;
      opacity: 0.6;
    }

    .hero__symbol svg {
      width: 100%;
      height: 100%;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: 40px;
      line-height: 1.2;
      color: var(--color-heading);
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 17px;
      line-height: 1.6;
      color: var(--color-muted);
      margin-bottom: 40px;
      letter-spacing: 0.3px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 15px;
      color: #fff;
      background: var(--color-cta-bg);
      border: none;
      padding: 16px 44px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 24px var(--color-accent-glow);
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px var(--color-accent-glow);
    }

    .hero__meta {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 32px;
    }

    .hero__meta-item {
      text-align: center;
    }

    .hero__meta-value {
      font-family: var(--font-heading);
      font-size: 22px;
      color: var(--color-heading);
      display: block;
      margin-bottom: 4px;
    }

    .hero__meta-label {
      font-size: 12px;
      color: var(--color-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Entrance */
    .hero__symbol, .hero__title, .hero__subtitle, .hero__cta, .hero__meta {
      opacity: 0;
      animation: emerge 1s ease forwards;
    }
    .hero__symbol { animation-delay: 0.1s; }
    .hero__title { animation-delay: 0.3s; }
    .hero__subtitle { animation-delay: 0.5s; }
    .hero__cta { animation-delay: 0.7s; }
    .hero__meta { animation-delay: 0.9s; }

    @keyframes emerge {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 768px) {
      .hero__content { max-width: 600px; }
      .hero__title { font-size: 54px; }
      .hero__subtitle { font-size: 19px; }
    }

    @media (min-width: 1440px) {
      .hero__content { max-width: 800px; }
      .hero__title { font-size: 74px; letter-spacing: -1px; }
      .hero__subtitle { font-size: 22px; max-width: 560px; margin-left: auto; margin-right: auto; }
      .hero__symbol { width: 56px; height: 56px; margin-bottom: 40px; }
      .hero__cta { font-size: 16px; padding: 18px 52px; }
      .hero__meta { gap: 48px; margin-top: 56px; }
      .hero__meta-value { font-size: 26px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__stars">
      <div class="hero__star"></div>
      <div class="hero__star"></div>
      <div class="hero__star"></div>
      <div class="hero__star"></div>
      <div class="hero__star"></div>
      <div class="hero__star"></div>
      <div class="hero__star"></div>
      <div class="hero__star"></div>
    </div>
    <div class="hero__content">
      <div class="hero__symbol">
        <svg viewBox="0 0 48 48" fill="none" stroke="rgba(155,127,212,0.7)" stroke-width="1">
          <circle cx="24" cy="24" r="20"/>
          <circle cx="24" cy="24" r="12"/>
          <circle cx="24" cy="24" r="4"/>
          <line x1="24" y1="4" x2="24" y2="44"/>
          <line x1="4" y1="24" x2="44" y2="24"/>
        </svg>
      </div>
      <h1 class="hero__title">Тишина внутри</h1>
      <p class="hero__subtitle">8 недель осознанной практики — путь к себе через медитацию</p>
      <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
      <div class="hero__meta">
        <div class="hero__meta-item">
          <span class="hero__meta-value">8</span>
          <span class="hero__meta-label">Недель</span>
        </div>
        <div class="hero__meta-item">
          <span class="hero__meta-value">56</span>
          <span class="hero__meta-label">Практик</span>
        </div>
        <div class="hero__meta-item">
          <span class="hero__meta-value">∞</span>
          <span class="hero__meta-label">Доступ</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
