<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant C: Split Sage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Commissioner:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #f5f2ed;
      --color-surface: #e8e2d8;
      --color-text: #4a4238;
      --color-heading: #2d2820;
      --color-accent: #7a8c6e;
      --color-accent-dark: #5d6d53;
      --color-accent-light: #c5d1bb;
      --color-muted: #8a8078;
      --font-heading: 'Lora', serif;
      --font-body: 'Commissioner', sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 24px 40px;
    }

    /* Mobile: stacked layout */
    .hero__visual {
      width: 100%;
      height: 280px;
      background: var(--color-surface);
      border-radius: 16px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    /* Abstract organic shape inside visual */
    .hero__visual::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(ellipse, var(--color-accent-light) 0%, transparent 70%);
      border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
      transform: translate(-50%, -50%);
      animation: morph 12s ease-in-out infinite;
    }

    .hero__visual::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      border: 1px solid var(--color-accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.4;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes morph {
      0%, 100% { border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%; }
      25% { border-radius: 50% 50% 40% 60% / 60% 40% 50% 50%; }
      50% { border-radius: 40% 60% 50% 50% / 50% 50% 60% 40%; }
      75% { border-radius: 50% 40% 60% 50% / 40% 60% 50% 50%; }
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.2; }
    }

    .hero__text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero__tag {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero__tag::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--color-accent);
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: 38px;
      line-height: 1.2;
      color: var(--color-heading);
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.7;
      color: var(--color-muted);
      margin-bottom: 32px;
      max-width: 400px;
    }

    .hero__actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      color: #fff;
      background: var(--color-accent-dark);
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .hero__cta:hover {
      background: #4d5e44;
      transform: translateY(-1px);
    }

    .hero__secondary {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 13px;
      color: var(--color-muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      padding: 0;
    }

    .hero__secondary:hover { color: var(--color-accent-dark); }

    .hero__features {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--color-surface);
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .hero__feature {
      font-size: 13px;
      color: var(--color-muted);
      line-height: 1.5;
    }

    .hero__feature strong {
      color: var(--color-text);
      font-weight: 500;
      display: block;
      margin-bottom: 2px;
    }

    /* Tablet */
    @media (min-width: 768px) {
      .hero {
        flex-direction: row;
        align-items: center;
        gap: 48px;
        padding: 48px 40px;
      }

      .hero__visual {
        width: 45%;
        min-width: 320px;
        height: auto;
        min-height: 480px;
        margin-bottom: 0;
        border-radius: 20px;
        order: 2;
      }

      .hero__text {
        order: 1;
        flex: 1;
      }

      .hero__title { font-size: 44px; }
      .hero__subtitle { font-size: 17px; }
      .hero__features { gap: 32px; }
    }

    /* Desktop */
    @media (min-width: 1440px) {
      .hero {
        max-width: 1400px;
        margin: 0 auto;
        gap: 80px;
        padding: 60px 60px;
      }

      .hero__visual {
        min-height: 600px;
        border-radius: 24px;
      }

      .hero__visual::before { width: 320px; height: 320px; }
      .hero__visual::after { width: 180px; height: 180px; }

      .hero__title { font-size: 64px; letter-spacing: -0.5px; }
      .hero__subtitle { font-size: 19px; max-width: 500px; }
      .hero__tag { font-size: 12px; letter-spacing: 3px; margin-bottom: 28px; }
      .hero__cta { font-size: 15px; padding: 16px 44px; }
      .hero__features { gap: 40px; margin-top: 56px; }
      .hero__feature { font-size: 14px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__visual"></div>
    <div class="hero__text">
      <p class="hero__tag">Онлайн-курс</p>
      <h1 class="hero__title">Тишина<br>внутри</h1>
      <p class="hero__subtitle">8 недель осознанной практики. Вы научитесь слышать себя — без мистики, без эзотерики. Только вы и ваше внимание.</p>
      <div class="hero__actions">
        <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
        <button class="hero__secondary">Подробнее о программе</button>
      </div>
      <div class="hero__features">
        <div class="hero__feature">
          <strong>8 недель</strong>
          Пошаговый путь
        </div>
        <div class="hero__feature">
          <strong>Аудио-практики</strong>
          Каждый день
        </div>
        <div class="hero__feature">
          <strong>Поддержка</strong>
          В закрытом чате
        </div>
      </div>
    </div>
  </section>
</body>
</html>
