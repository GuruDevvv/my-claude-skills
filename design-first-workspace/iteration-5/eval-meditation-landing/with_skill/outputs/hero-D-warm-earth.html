<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant D: Warm Earth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #f9f3eb;
      --color-warm: #eee0cd;
      --color-text: #4a3c30;
      --color-heading: #2e231a;
      --color-accent: #c97d4f;
      --color-accent-hover: #b06a3e;
      --color-muted: #907c6c;
      --color-cream: #fff8f0;
      --font-heading: 'Literata', serif;
      --font-body: 'Manrope', sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 48px 24px 40px;
      position: relative;
    }

    /* Layered warm gradients */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(201,125,79,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(238,224,205,0.6) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero__content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    /* Breathing circle */
    .hero__circle {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-cream) 30%, var(--color-warm) 100%);
      box-shadow: 0 0 60px rgba(201,125,79,0.15);
      animation: breathe 8s ease-in-out infinite;
      position: relative;
    }

    .hero__circle::after {
      content: '';
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      border: 1px solid rgba(201,125,79,0.2);
      animation: breathe 8s ease-in-out infinite reverse;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: 40px;
      line-height: 1.2;
      color: var(--color-heading);
      margin-bottom: 12px;
    }

    .hero__divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      margin: 20px auto;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 17px;
      line-height: 1.6;
      color: var(--color-muted);
      margin-bottom: 36px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 15px;
      color: #fff;
      background: var(--color-accent);
      border: none;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(201,125,79,0.2);
      position: relative;
      overflow: hidden;
    }

    .hero__cta::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    .hero__cta:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,125,79,0.3);
    }

    .hero__cta:hover::before {
      left: 100%;
    }

    .hero__trust {
      margin-top: 40px;
      font-size: 13px;
      color: var(--color-muted);
      font-weight: 300;
    }

    .hero__trust span {
      display: inline-block;
      margin: 0 4px;
      font-size: 16px;
      vertical-align: middle;
      opacity: 0.6;
    }

    /* Card-style features */
    .hero__cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 36px;
      width: 100%;
    }

    .hero__card {
      background: var(--color-cream);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      border: 1px solid rgba(201,125,79,0.1);
    }

    .hero__card-title {
      font-family: var(--font-heading);
      font-size: 15px;
      color: var(--color-heading);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .hero__card-text {
      font-size: 13px;
      color: var(--color-muted);
      font-weight: 300;
      line-height: 1.5;
    }

    @media (min-width: 768px) {
      .hero__content { max-width: 620px; }
      .hero__title { font-size: 52px; }
      .hero__subtitle { font-size: 18px; }
      .hero__cards { grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
      .hero__circle { width: 140px; height: 140px; }
    }

    @media (min-width: 1440px) {
      .hero__content { max-width: 900px; }
      .hero__title { font-size: 72px; letter-spacing: -1px; }
      .hero__subtitle { font-size: 21px; max-width: 560px; margin-left: auto; margin-right: auto; }
      .hero__circle { width: 160px; height: 160px; margin-bottom: 48px; }
      .hero__cta { font-size: 16px; padding: 18px 48px; }
      .hero__cards { gap: 20px; max-width: 700px; margin-left: auto; margin-right: auto; }
      .hero__card { padding: 20px 24px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__content">
      <div class="hero__circle"></div>
      <h1 class="hero__title">Тишина внутри</h1>
      <div class="hero__divider"></div>
      <p class="hero__subtitle">8 недель осознанной практики</p>
      <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
      <p class="hero__trust">Уже прошли курс <span>♡</span> более 200 женщин</p>
      <div class="hero__cards">
        <div class="hero__card">
          <div class="hero__card-title">Аудио-медитации</div>
          <div class="hero__card-text">Практики от 10 до 30 минут на каждый день</div>
        </div>
        <div class="hero__card">
          <div class="hero__card-title">Дневник осознанности</div>
          <div class="hero__card-text">Рефлексия и наблюдение за собой</div>
        </div>
        <div class="hero__card">
          <div class="hero__card-title">Живая поддержка</div>
          <div class="hero__card-text">Закрытый чат и еженедельные созвоны</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
