<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant A: Soft Dawn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #faf6f1;
      --color-text: #3d2e2a;
      --color-heading: #5c3a2e;
      --color-accent: #c4956a;
      --color-accent-light: #e8d5c0;
      --color-cta: #b07a50;
      --color-cta-hover: #96633c;
      --color-muted: #9a857a;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Raleway', sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Decorative gradient orb */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 24px 40px;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -30%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(196,149,106,0.25) 0%, rgba(196,149,106,0.05) 50%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: float-orb 8s ease-in-out infinite;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -10%;
      left: -20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,213,192,0.3) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
      animation: float-orb 10s ease-in-out infinite reverse;
    }

    @keyframes float-orb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -30px) scale(1.05); }
    }

    .hero__content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    .hero__eyebrow {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 24px;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: 42px;
      line-height: 1.15;
      color: var(--color-heading);
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .hero__subtitle {
      font-family: var(--font-heading);
      font-weight: 400;
      font-style: italic;
      font-size: 20px;
      line-height: 1.5;
      color: var(--color-muted);
      margin-bottom: 40px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      background: var(--color-cta);
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(176,122,80,0.25);
    }

    .hero__cta:hover {
      background: var(--color-cta-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(176,122,80,0.35);
    }

    .hero__details {
      margin-top: 32px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero__detail {
      font-size: 13px;
      color: var(--color-muted);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hero__detail-icon {
      width: 16px;
      height: 16px;
      opacity: 0.5;
    }

    /* Decorative line */
    .hero__divider {
      width: 40px;
      height: 1px;
      background: var(--color-accent-light);
      margin: 0 auto 24px;
    }

    /* Entrance animations */
    .hero__eyebrow, .hero__title, .hero__subtitle, .hero__cta, .hero__details {
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.8s ease forwards;
    }
    .hero__eyebrow { animation-delay: 0.2s; }
    .hero__title { animation-delay: 0.4s; }
    .hero__subtitle { animation-delay: 0.6s; }
    .hero__cta { animation-delay: 0.8s; }
    .hero__details { animation-delay: 1s; }

    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tablet */
    @media (min-width: 768px) {
      .hero__content { max-width: 600px; }
      .hero__title { font-size: 52px; }
      .hero__subtitle { font-size: 22px; }
      .hero__eyebrow { font-size: 13px; letter-spacing: 4px; }
    }

    /* Desktop */
    @media (min-width: 1440px) {
      .hero__content { max-width: 800px; }
      .hero__title { font-size: 72px; letter-spacing: -1px; }
      .hero__subtitle { font-size: 26px; max-width: 560px; margin-left: auto; margin-right: auto; }
      .hero__eyebrow { font-size: 14px; letter-spacing: 5px; margin-bottom: 32px; }
      .hero__cta { font-size: 15px; padding: 18px 48px; }
      .hero::before { width: 700px; height: 700px; }
      .hero::after { width: 600px; height: 600px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__content">
      <p class="hero__eyebrow">Онлайн-курс медитации</p>
      <div class="hero__divider"></div>
      <h1 class="hero__title">Тишина внутри</h1>
      <p class="hero__subtitle">8 недель осознанной практики</p>
      <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
      <div class="hero__details">
        <span class="hero__detail">
          <svg class="hero__detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          8 недель
        </span>
        <span class="hero__detail">
          <svg class="hero__detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Видео + аудио
        </span>
        <span class="hero__detail">
          <svg class="hero__detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          С поддержкой
        </span>
      </div>
    </div>
  </section>
</body>
</html>
