<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant E: Editorial Mist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #f0ece6;
      --color-dark: #1e1c18;
      --color-text: #3a3630;
      --color-heading: #1e1c18;
      --color-accent: #8b6f4e;
      --color-accent-light: #c4a97a;
      --color-muted: #8a837a;
      --color-line: #d4cec4;
      --font-heading: 'Philosopher', sans-serif;
      --font-body: 'Jost', sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Editorial / magazine layout */
    .hero {
      min-height: 100vh;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .hero__topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--color-line);
      margin-bottom: 32px;
    }

    .hero__logo {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-heading);
    }

    .hero__nav-hint {
      font-size: 12px;
      color: var(--color-muted);
      letter-spacing: 1px;
    }

    /* Main content */
    .hero__main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero__overline {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 20px;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: 48px;
      line-height: 1.1;
      color: var(--color-heading);
      margin-bottom: 24px;
    }

    .hero__title em {
      font-style: italic;
      color: var(--color-accent);
    }

    .hero__body {
      font-weight: 300;
      font-size: 16px;
      line-height: 1.7;
      color: var(--color-muted);
      margin-bottom: 32px;
      max-width: 420px;
    }

    .hero__cta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .hero__cta {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      color: var(--color-bg);
      background: var(--color-dark);
      border: none;
      padding: 14px 36px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .hero__cta:hover {
      background: var(--color-accent);
    }

    .hero__price {
      font-family: var(--font-heading);
      font-size: 20px;
      color: var(--color-accent);
      font-weight: 400;
    }

    /* Bottom stats row */
    .hero__bottom {
      display: flex;
      gap: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--color-line);
      margin-top: 40px;
    }

    .hero__stat {
      display: flex;
      flex-direction: column;
    }

    .hero__stat-value {
      font-family: var(--font-heading);
      font-size: 28px;
      color: var(--color-heading);
      font-weight: 700;
    }

    .hero__stat-label {
      font-size: 11px;
      color: var(--color-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Right decorative column (appears on desktop) */
    .hero__deco-col {
      display: none;
    }

    @media (min-width: 768px) {
      .hero {
        padding: 40px 48px;
      }

      .hero__title { font-size: 56px; }

      .hero__deco-col {
        display: block;
        position: fixed;
        right: 0;
        top: 0;
        width: 35%;
        height: 100vh;
        background: linear-gradient(180deg, #e4ddd0 0%, #d6ccba 50%, #cbc0ad 100%);
        z-index: 0;
      }

      .hero__deco-col::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 150px;
        height: 150px;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(139,111,78,0.3);
        border-radius: 50%;
        animation: breathe 6s ease-in-out infinite;
      }

      .hero__deco-col::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 80px;
        height: 80px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(196,169,122,0.4), transparent);
        border-radius: 50%;
        animation: breathe 6s ease-in-out infinite reverse;
      }

      @keyframes breathe {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
      }

      .hero {
        width: 65%;
        position: relative;
        z-index: 1;
      }

      .hero__body { font-size: 17px; max-width: 480px; }
    }

    @media (min-width: 1440px) {
      .hero {
        padding: 48px 80px;
        width: 60%;
      }

      .hero__deco-col { width: 40%; }

      .hero__title { font-size: 76px; letter-spacing: -1px; }
      .hero__overline { font-size: 14px; letter-spacing: 4px; margin-bottom: 28px; }
      .hero__body { font-size: 19px; max-width: 540px; }
      .hero__cta { font-size: 15px; padding: 16px 44px; }
      .hero__price { font-size: 24px; }
      .hero__bottom { gap: 48px; margin-top: 56px; }
      .hero__stat-value { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="hero__deco-col"></div>
  <section class="hero">
    <div class="hero__topbar">
      <div class="hero__logo">Тишина</div>
      <div class="hero__nav-hint">Онлайн-курс медитации</div>
    </div>
    <div class="hero__main">
      <p class="hero__overline">8 недель практики</p>
      <h1 class="hero__title">Тишина<br><em>внутри</em></h1>
      <p class="hero__body">Курс осознанной медитации для тех, кто готов замедлиться. Без эзотерики и мистики — научный подход к тишине ума.</p>
      <div class="hero__cta-row">
        <a href="#" class="hero__cta">Начать путь</a>
        <span class="hero__price">3 900 ₽</span>
      </div>
    </div>
    <div class="hero__bottom">
      <div class="hero__stat">
        <span class="hero__stat-value">8</span>
        <span class="hero__stat-label">Недель</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-value">56</span>
        <span class="hero__stat-label">Практик</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-value">24/7</span>
        <span class="hero__stat-label">Доступ</span>
      </div>
    </div>
  </section>
</body>
</html>
