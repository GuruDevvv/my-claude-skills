<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant D: Soft Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #faf9f7;
      --color-bg-warm: #f5f0ea;
      --color-text: #3d3832;
      --color-text-soft: #8a8078;
      --color-blush: #e8bfb1;
      --color-blush-deep: #d4947e;
      --color-lavender: #c5b8d9;
      --color-sky: #b8cfe0;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Nunito', sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.25rem, 5vw, 3rem);
      position: relative;
      overflow: hidden;
    }

    /* Floating blurred shapes */
    .hero__blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite alternate;
    }

    .hero__blob--1 {
      width: clamp(200px, 35vw, 500px);
      height: clamp(200px, 35vw, 500px);
      background: var(--color-blush);
      opacity: 0.25;
      top: 10%;
      right: -5%;
      animation-delay: 0s;
    }

    .hero__blob--2 {
      width: clamp(180px, 30vw, 450px);
      height: clamp(180px, 30vw, 450px);
      background: var(--color-lavender);
      opacity: 0.2;
      bottom: 5%;
      left: -5%;
      animation-delay: -3s;
    }

    .hero__blob--3 {
      width: clamp(120px, 20vw, 300px);
      height: clamp(120px, 20vw, 300px);
      background: var(--color-sky);
      opacity: 0.2;
      top: 30%;
      left: 20%;
      animation-delay: -5s;
    }

    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 850px;
      width: 100%;
    }

    .hero__icon {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: clamp(1rem, 2vw, 1.5rem);
      opacity: 0;
      animation: softIn 1s ease 0.2s forwards;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      line-height: 1.2;
      color: var(--color-text);
      margin-bottom: clamp(0.75rem, 2vw, 1.25rem);
      opacity: 0;
      animation: softIn 1s ease 0.4s forwards;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--color-text-soft);
      width: min(85%, 600px);
      margin: 0 auto clamp(2rem, 4vw, 3rem);
      line-height: 1.7;
      opacity: 0;
      animation: softIn 1s ease 0.6s forwards;
    }

    .hero__card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.75rem, 2vw, 1.25rem);
      background: #fff;
      border-radius: 24px;
      padding: clamp(1.5rem, 3vw, 2.5rem) clamp(2rem, 4vw, 3.5rem);
      box-shadow: 0 4px 40px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02);
      opacity: 0;
      animation: softIn 1s ease 0.8s forwards;
    }

    .hero__card-title {
      font-family: var(--font-heading);
      font-weight: 500;
      font-size: clamp(0.95rem, 1.5vw, 1.1rem);
      color: var(--color-text);
    }

    .hero__card-features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.5rem, 1.5vw, 0.75rem);
    }

    .hero__card-feature {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text-soft);
      background: var(--color-bg-warm);
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: clamp(0.9rem, 1.3vw, 1rem);
      color: #fff;
      background: linear-gradient(135deg, var(--color-blush-deep), var(--color-blush));
      border: none;
      padding: clamp(0.9rem, 1.8vw, 1.15rem) clamp(2rem, 4vw, 3rem);
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212,148,126,0.35);
    }

    .hero__trust {
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      font-size: 0.8rem;
      color: var(--color-text-soft);
      opacity: 0;
      animation: softIn 1s ease 1s forwards;
    }

    @keyframes softIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(20px, -20px); }
    }

    @media (min-width: 768px) {
      .hero__title { font-size: 3.2rem; }
      .hero__subtitle { width: min(70%, 600px); font-size: 1.15rem; }
      .hero__card { flex-direction: row; gap: clamp(1.5rem, 3vw, 2.5rem); }
    }

    @media (min-width: 1024px) {
      .hero__title { font-size: 4rem; }
      .hero__subtitle { font-size: 1.2rem; }
      .hero__card { padding: 2rem 3.5rem; border-radius: 28px; }
    }

    @media (min-width: 1440px) {
      .hero__title { font-size: 4.5rem; }
      .hero__content { max-width: 950px; }
      .hero__subtitle { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__blob hero__blob--1"></div>
    <div class="hero__blob hero__blob--2"></div>
    <div class="hero__blob hero__blob--3"></div>
    <div class="hero__content">
      <div class="hero__icon">&#x1F54A;</div>
      <h1 class="hero__title">Тишина внутри</h1>
      <p class="hero__subtitle">8 недель осознанной практики. Вдохните глубоко. Курс, который учит не бежать от мыслей, а быть с ними в мире.</p>
      <div class="hero__card">
        <div>
          <p class="hero__card-title">Что входит в курс</p>
          <div class="hero__card-features">
            <span class="hero__card-feature">8 модулей</span>
            <span class="hero__card-feature">Аудио-медитации</span>
            <span class="hero__card-feature">Видеоуроки</span>
            <span class="hero__card-feature">Чат</span>
          </div>
        </div>
        <a href="#" class="hero__cta">Начать путь — 3 900 &#8381;</a>
      </div>
      <p class="hero__trust">Более 200 участниц прошли этот путь</p>
    </div>
  </section>
</body>
</html>
