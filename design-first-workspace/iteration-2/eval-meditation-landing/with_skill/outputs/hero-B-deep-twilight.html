<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant B: Deep Twilight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #0c0e1a;
      --color-bg-card: rgba(255,255,255,0.04);
      --color-text: #e8e4df;
      --color-text-soft: #9a9490;
      --color-accent: #7b8cde;
      --color-accent-glow: rgba(123,140,222,0.15);
      --color-warm: #d4a574;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.25rem, 5vw, 3rem);
      position: relative;
      overflow: hidden;
    }

    /* Starfield dots */
    .hero__stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .hero__stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    .hero__stars span:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; opacity: 0.3; }
    .hero__stars span:nth-child(2) { top: 25%; left: 75%; animation-delay: 0.8s; opacity: 0.5; }
    .hero__stars span:nth-child(3) { top: 60%; left: 10%; animation-delay: 1.5s; opacity: 0.2; }
    .hero__stars span:nth-child(4) { top: 70%; left: 85%; animation-delay: 0.3s; opacity: 0.4; }
    .hero__stars span:nth-child(5) { top: 40%; left: 50%; animation-delay: 2s; opacity: 0.3; width: 3px; height: 3px; }
    .hero__stars span:nth-child(6) { top: 85%; left: 35%; animation-delay: 1s; opacity: 0.25; }
    .hero__stars span:nth-child(7) { top: 10%; left: 55%; animation-delay: 1.8s; opacity: 0.35; }
    .hero__stars span:nth-child(8) { top: 50%; left: 30%; animation-delay: 0.5s; opacity: 0.2; }

    /* Gradient orb */
    .hero::before {
      content: '';
      position: absolute;
      width: clamp(250px, 40vw, 600px);
      height: clamp(250px, 40vw, 600px);
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(60px);
    }

    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 900px;
      width: 100%;
    }

    .hero__eyebrow {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: clamp(1.25rem, 3vw, 2rem);
      opacity: 0;
      animation: fadeIn 1s ease 0.3s forwards;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      line-height: 1.15;
      color: var(--color-text);
      margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
      opacity: 0;
      animation: fadeIn 1s ease 0.5s forwards;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--color-text-soft);
      width: min(85%, 600px);
      margin: 0 auto clamp(2rem, 4vw, 3rem);
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 1s ease 0.7s forwards;
    }

    .hero__glass-card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 2vw, 1.5rem);
      background: var(--color-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: clamp(1.5rem, 3vw, 2.5rem) clamp(2rem, 4vw, 3.5rem);
      opacity: 0;
      animation: fadeIn 1s ease 0.9s forwards;
    }

    .hero__price {
      font-family: var(--font-heading);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--color-warm);
      font-weight: 400;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
      letter-spacing: 0.05em;
      color: var(--color-bg);
      background: linear-gradient(135deg, var(--color-accent), #9ba8ec);
      border: none;
      padding: clamp(0.85rem, 1.8vw, 1.1rem) clamp(2rem, 4vw, 3rem);
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(123,140,222,0.3);
    }

    .hero__features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.75rem, 2vw, 1.5rem);
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      opacity: 0;
      animation: fadeIn 1s ease 1.1s forwards;
    }

    .hero__feature {
      font-size: 0.8rem;
      color: var(--color-text-soft);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .hero__feature::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-accent);
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes twinkle {
      from { opacity: 0.1; }
      to { opacity: 0.6; }
    }

    @media (min-width: 768px) {
      .hero__title { font-size: 3.2rem; }
      .hero__subtitle { width: min(70%, 600px); font-size: 1.15rem; }
      .hero__features { gap: clamp(1rem, 2vw, 2rem); }
    }

    @media (min-width: 1024px) {
      .hero__title { font-size: 4rem; }
      .hero__subtitle { font-size: 1.2rem; }
      .hero__glass-card { padding: 2.5rem 4rem; }
    }

    @media (min-width: 1440px) {
      .hero__title { font-size: 4.5rem; }
      .hero__content { max-width: 950px; }
      .hero__subtitle { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__stars">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="hero__content">
      <p class="hero__eyebrow">Онлайн-курс медитации</p>
      <h1 class="hero__title">Тишина внутри</h1>
      <p class="hero__subtitle">8 недель осознанной практики. Вы научитесь слышать себя сквозь шум повседневности.</p>
      <div class="hero__glass-card">
        <span class="hero__price">3 900 &#8381;</span>
        <a href="#" class="hero__cta">Начать путь</a>
      </div>
      <div class="hero__features">
        <span class="hero__feature">8 недель</span>
        <span class="hero__feature">Видеоуроки</span>
        <span class="hero__feature">Практики</span>
        <span class="hero__feature">Запись</span>
      </div>
    </div>
  </section>
</body>
</html>
