<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant E: Golden Dusk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #1a1510;
      --color-text: #f0e8dc;
      --color-text-soft: #a89882;
      --color-gold: #d4a854;
      --color-gold-light: #e8c888;
      --color-amber: #c48530;
      --color-warm-black: #2a2218;
      --font-heading: 'Libre Baskerville', Georgia, serif;
      --font-body: 'Jost', sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.25rem, 5vw, 3rem);
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(212,168,84,0.08) 0%, transparent 60%),
        linear-gradient(180deg, var(--color-bg) 0%, #1e1a14 50%, var(--color-bg) 100%);
    }

    /* Golden ring decoration */
    .hero__ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(280px, 45vw, 600px);
      height: clamp(280px, 45vw, 600px);
      border-radius: 50%;
      border: 1px solid rgba(212,168,84,0.1);
      pointer-events: none;
    }

    .hero__ring--inner {
      width: clamp(220px, 35vw, 480px);
      height: clamp(220px, 35vw, 480px);
      border-color: rgba(212,168,84,0.06);
    }

    /* Grain */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 900px;
      width: 100%;
    }

    .hero__symbol {
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: var(--color-gold);
      margin-bottom: clamp(1.25rem, 3vw, 2rem);
      opacity: 0;
      animation: goldFade 1.2s ease 0.2s forwards;
      letter-spacing: 0.5em;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 5rem);
      line-height: 1.1;
      color: var(--color-text);
      margin-bottom: clamp(0.5rem, 1.5vw, 0.75rem);
      opacity: 0;
      animation: goldFade 1.2s ease 0.4s forwards;
    }

    .hero__title-accent {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--color-gold-light);
    }

    .hero__line {
      width: clamp(40px, 5vw, 70px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: clamp(1.25rem, 2.5vw, 2rem) auto;
      opacity: 0;
      animation: goldFade 1.2s ease 0.6s forwards;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--color-text-soft);
      width: min(85%, 600px);
      margin: 0 auto clamp(2rem, 4vw, 3rem);
      line-height: 1.6;
      opacity: 0;
      animation: goldFade 1.2s ease 0.8s forwards;
    }

    .hero__cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.75rem, 1.5vw, 1rem);
      opacity: 0;
      animation: goldFade 1.2s ease 1s forwards;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(0.9rem, 1.3vw, 1.05rem);
      letter-spacing: 0.1em;
      color: var(--color-bg);
      background: linear-gradient(135deg, var(--color-gold), var(--color-amber));
      border: none;
      padding: clamp(0.9rem, 1.8vw, 1.15rem) clamp(2.5rem, 5vw, 3.5rem);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212,168,84,0.3);
    }

    .hero__cta-sub {
      font-size: 0.8rem;
      color: var(--color-text-soft);
      font-weight: 300;
    }

    .hero__features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(1.5rem, 3vw, 3rem);
      margin-top: clamp(2.5rem, 5vw, 4rem);
      opacity: 0;
      animation: goldFade 1.2s ease 1.2s forwards;
    }

    .hero__feature {
      text-align: center;
    }

    .hero__feature-num {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: var(--color-gold);
      display: block;
    }

    .hero__feature-label {
      font-size: 0.75rem;
      color: var(--color-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }

    @keyframes goldFade {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 768px) {
      .hero__title { font-size: 3.5rem; }
      .hero__subtitle { width: min(65%, 600px); font-size: 1.15rem; }
      .hero__features { gap: clamp(2rem, 4vw, 4rem); }
    }

    @media (min-width: 1024px) {
      .hero__title { font-size: 4.2rem; }
      .hero__subtitle { font-size: 1.2rem; }
    }

    @media (min-width: 1440px) {
      .hero__title { font-size: 5rem; }
      .hero__content { max-width: 1000px; }
      .hero__subtitle { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__ring"></div>
    <div class="hero__ring hero__ring--inner"></div>
    <div class="hero__content">
      <p class="hero__symbol">&#10022; &#10022; &#10022;</p>
      <h1 class="hero__title">
        Тишина
        <span class="hero__title-accent">внутри</span>
      </h1>
      <div class="hero__line"></div>
      <p class="hero__subtitle">8 недель осознанной практики. Курс, который не учит вас медитировать — он возвращает вам право на тишину.</p>
      <div class="hero__cta-group">
        <a href="#" class="hero__cta">Начать путь — 3 900 &#8381;</a>
        <span class="hero__cta-sub">Доступ навсегда &middot; Можно в своём темпе</span>
      </div>
      <div class="hero__features">
        <div class="hero__feature">
          <span class="hero__feature-num">8</span>
          <span class="hero__feature-label">Недель</span>
        </div>
        <div class="hero__feature">
          <span class="hero__feature-num">32</span>
          <span class="hero__feature-label">Практики</span>
        </div>
        <div class="hero__feature">
          <span class="hero__feature-num">&#8734;</span>
          <span class="hero__feature-label">Доступ</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
