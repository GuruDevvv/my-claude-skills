<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant C: Sage Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #f0ece4;
      --color-panel: #3a4a3a;
      --color-panel-text: #e8e4db;
      --color-text: #2c3e2c;
      --color-text-soft: #6b7a6b;
      --color-sage: #7a9a7a;
      --color-sage-light: #b8ccb8;
      --color-cream: #f7f4ee;
      --color-terracotta: #c4755a;
      --font-heading: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
      padding: clamp(1.5rem, 4vw, 2.5rem);
      position: relative;
    }

    .hero__layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1.5rem, 3vw, 2rem);
      min-height: 0;
    }

    .hero__left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 4vw, 3rem);
      order: 2;
    }

    .hero__right {
      background: var(--color-panel);
      border-radius: clamp(16px, 2vw, 24px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(2.5rem, 5vw, 4rem) clamp(2rem, 4vw, 3rem);
      position: relative;
      overflow: hidden;
      order: 1;
    }

    /* Botanical SVG decoration */
    .hero__right::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -15%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(122,154,122,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero__leaf {
      position: absolute;
      opacity: 0.06;
      font-size: clamp(4rem, 10vw, 8rem);
      color: var(--color-sage-light);
      pointer-events: none;
    }
    .hero__leaf--1 { top: 8%; right: 8%; transform: rotate(25deg); }
    .hero__leaf--2 { bottom: 10%; left: 5%; transform: rotate(-15deg); font-size: clamp(3rem, 8vw, 6rem); }

    .hero__tag {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-sage);
      margin-bottom: clamp(1rem, 2vw, 1.5rem);
    }

    .hero__title {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: clamp(2rem, 5.5vw, 4rem);
      line-height: 1.15;
      color: var(--color-text);
      margin-bottom: clamp(0.75rem, 2vw, 1.25rem);
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--color-text-soft);
      width: min(90%, 600px);
      line-height: 1.6;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }

    .hero__meta {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(0.5rem, 1.5vw, 1rem);
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }

    .hero__meta-item {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text-soft);
      background: rgba(122,154,122,0.1);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      border: 1px solid rgba(122,154,122,0.15);
    }

    /* Right panel content */
    .hero__right-title {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 4vw, 3rem);
      color: var(--color-panel-text);
      text-align: center;
      margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
      position: relative;
      z-index: 1;
    }

    .hero__right-sub {
      font-weight: 300;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      color: var(--color-sage-light);
      text-align: center;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
      width: min(80%, 500px);
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
      color: var(--color-panel);
      background: var(--color-cream);
      border: none;
      padding: clamp(0.9rem, 1.8vw, 1.15rem) clamp(2rem, 4vw, 3rem);
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .hero__cta:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    @media (min-width: 768px) {
      .hero__layout {
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 5rem);
      }
      .hero__left { order: 1; padding: clamp(2rem, 4vw, 4rem); }
      .hero__right { order: 2; }
      .hero__title { font-size: 2.8rem; }
    }

    @media (min-width: 1024px) {
      .hero__layout {
        grid-template-columns: 1fr 1.1fr;
      }
      .hero__title { font-size: 3.5rem; }
      .hero__left { padding: 3rem 4rem; }
      .hero__right { padding: 4rem 3.5rem; }
      .hero__right-title { font-size: 2.5rem; }
    }

    @media (min-width: 1440px) {
      .hero__layout {
        grid-template-columns: 1fr 1.2fr;
        max-width: 1400px;
        margin: 0 auto;
      }
      .hero__title { font-size: 4rem; }
      .hero__subtitle { font-size: 1.25rem; }
      .hero__right-title { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__layout">
      <div class="hero__left">
        <p class="hero__tag">Онлайн-курс медитации</p>
        <h1 class="hero__title">Тишина внутри</h1>
        <p class="hero__subtitle">Курс для тех, кто устал от внутреннего шума. 8 недель мягкой практики, чтобы вернуть себе ясность и спокойствие.</p>
        <div class="hero__meta">
          <span class="hero__meta-item">8 недель</span>
          <span class="hero__meta-item">Видеоуроки</span>
          <span class="hero__meta-item">Медитации</span>
          <span class="hero__meta-item">Чат поддержки</span>
        </div>
      </div>
      <div class="hero__right">
        <span class="hero__leaf hero__leaf--1">&#x1F33F;</span>
        <span class="hero__leaf hero__leaf--2">&#x1F33F;</span>
        <h2 class="hero__right-title">Начните свой путь</h2>
        <p class="hero__right-sub">8 недель осознанной практики</p>
        <a href="#" class="hero__cta">Записаться — 3 900 &#8381;</a>
      </div>
    </div>
  </section>
</body>
</html>
