<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant A: Zen Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --bg-card: rgba(255, 255, 255, 0.03);
      --text: #e8e4df;
      --text-muted: #9a948c;
      --accent: #b8a88a;
      --accent-warm: #d4a574;
      --accent-sage: #7a8c6e;
      --border: rgba(184, 168, 138, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 60px 24px 40px;
    }

    /* Radial gradient atmosphere */
    .hero::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 80%;
      background: radial-gradient(ellipse at center, rgba(184, 168, 138, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Enso circle — the zen symbol */
    .enso {
      width: 120px;
      height: 120px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      opacity: 0.2;
      margin-bottom: 40px;
      position: relative;
      animation: enso-breathe 6s ease-in-out infinite;
    }

    .enso::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      opacity: 0.5;
    }

    /* Gap in the enso circle */
    .enso::after {
      content: '';
      position: absolute;
      top: -4px;
      right: 10px;
      width: 30px;
      height: 12px;
      background: var(--bg);
    }

    @keyframes enso-breathe {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.05); opacity: 0.35; }
    }

    .overline {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Cormorant', serif;
      font-weight: 400;
      font-size: 42px;
      line-height: 1.15;
      color: var(--text);
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent-warm);
    }

    .subtitle {
      font-family: 'Cormorant', serif;
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 48px;
      max-width: 320px;
    }

    .cta-button {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 16px 40px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease;
      position: relative;
    }

    .cta-button:hover {
      background: var(--accent-warm);
      transform: translateY(-2px);
    }

    .meta {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .meta-item {
      text-align: center;
    }

    .meta-value {
      font-family: 'Cormorant', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
      display: block;
    }

    .meta-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Decorative dots — like zen garden stones */
    .stones {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      opacity: 0.2;
    }

    .stones span {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
    }

    .stones span:nth-child(2) { width: 6px; height: 6px; }

    @media (min-width: 768px) {
      h1 { font-size: 64px; }
      .subtitle { font-size: 24px; max-width: 460px; }
      .enso { width: 160px; height: 160px; }
      .enso::after { width: 40px; height: 16px; }
      .meta { gap: 56px; }
      .meta-value { font-size: 28px; }
    }

    @media (min-width: 1440px) {
      h1 { font-size: 80px; letter-spacing: -1px; }
      .subtitle { font-size: 26px; max-width: 540px; }
      .enso { width: 180px; height: 180px; }
      .cta-button { padding: 18px 52px; font-size: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .enso { animation: none; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="enso"></div>
    <p class="overline">Онлайн-курс медитации</p>
    <h1>Тишина<br><em>внутри</em></h1>
    <p class="subtitle">8 недель осознанной практики для тех, кто готов услышать себя</p>
    <a href="#" class="cta-button">Начать путь — 3 900 ₽</a>
    <div class="meta">
      <div class="meta-item">
        <span class="meta-value">8</span>
        <span class="meta-label">Недель</span>
      </div>
      <div class="meta-item">
        <span class="meta-value">32</span>
        <span class="meta-label">Практики</span>
      </div>
      <div class="meta-item">
        <span class="meta-value">∞</span>
        <span class="meta-label">Доступ</span>
      </div>
    </div>
    <div class="stones">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </section>
</body>
</html>
