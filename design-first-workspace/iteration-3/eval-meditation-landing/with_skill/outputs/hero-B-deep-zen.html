<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant B: Deep Zen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #0c1222;
      --color-surface: #141c33;
      --color-text: #e4e8f1;
      --color-text-dim: #8893ab;
      --color-accent: #6b8afd;
      --color-accent-glow: rgba(107, 138, 253, 0.25);
      --font-main: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-main);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle radial glow */
    .hero::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Ring decoration */
    .hero__ring {
      width: 80px;
      height: 80px;
      border: 1px solid rgba(107, 138, 253, 0.3);
      border-radius: 50%;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero__ring::after {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--color-accent);
      border-radius: 50%;
    }

    .hero__label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 24px;
    }

    .hero__title {
      font-weight: 300;
      font-size: 36px;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-weight: 300;
      font-size: 16px;
      color: var(--color-text-dim);
      margin-bottom: 48px;
      max-width: 300px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-main);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: var(--color-bg);
      background: var(--color-accent);
      border: none;
      padding: 16px 36px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow 0.3s ease;
    }

    .hero__cta:hover {
      box-shadow: 0 0 24px var(--color-accent-glow);
    }

    .hero__meta {
      margin-top: 32px;
      display: flex;
      gap: 24px;
    }

    .hero__meta-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hero__meta-value {
      font-weight: 500;
      font-size: 16px;
      color: var(--color-text);
    }

    .hero__meta-label {
      font-size: 11px;
      color: var(--color-text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (min-width: 768px) {
      .hero {
        padding: 64px 40px;
      }

      .hero::before {
        width: 500px;
        height: 500px;
      }

      .hero__ring {
        width: 100px;
        height: 100px;
        margin-bottom: 40px;
      }

      .hero__label {
        font-size: 12px;
        letter-spacing: 4px;
        margin-bottom: 32px;
      }

      .hero__title {
        font-size: 56px;
        letter-spacing: -1px;
      }

      .hero__subtitle {
        font-size: 19px;
        max-width: 460px;
        margin-bottom: 56px;
      }

      .hero__cta {
        font-size: 15px;
        padding: 18px 44px;
      }

      .hero__meta {
        margin-top: 48px;
        gap: 48px;
      }

      .hero__meta-value {
        font-size: 18px;
      }
    }

    @media (min-width: 1440px) {
      .hero__title {
        font-size: 72px;
      }

      .hero__subtitle {
        font-size: 22px;
        max-width: 560px;
      }

      .hero::before {
        width: 700px;
        height: 700px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__ring"></div>
    <p class="hero__label">Онлайн-курс</p>
    <h1 class="hero__title">Тишина внутри</h1>
    <p class="hero__subtitle">8 недель осознанной практики для тех, кто устал от шума</p>
    <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
    <div class="hero__meta">
      <div class="hero__meta-item">
        <span class="hero__meta-value">8</span>
        <span class="hero__meta-label">Недель</span>
      </div>
      <div class="hero__meta-item">
        <span class="hero__meta-value">24</span>
        <span class="hero__meta-label">Практики</span>
      </div>
      <div class="hero__meta-item">
        <span class="hero__meta-value">∞</span>
        <span class="hero__meta-label">Доступ</span>
      </div>
    </div>
  </section>
</body>
</html>
