<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant D: Soft Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #f5f0f8;
      --color-text: #4a3f5c;
      --color-heading: #2e2344;
      --color-accent: #9b7ec8;
      --color-accent-soft: #c4aee0;
      --color-cta: #7b5ea7;
      --color-cta-hover: #644b8a;
      --color-muted: #8e82a0;
      --color-card: rgba(255, 255, 255, 0.6);
      --font-heading: 'Nunito', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 24px 40px;
      position: relative;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(155, 126, 200, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(196, 174, 224, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(155, 126, 200, 0.08) 0%, transparent 40%);
    }

    .hero__badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(155, 126, 200, 0.2);
      border-radius: 24px;
      padding: 8px 20px;
      margin-bottom: 32px;
    }

    .hero__badge-dot {
      width: 6px;
      height: 6px;
      background: var(--color-accent);
      border-radius: 50%;
    }

    .hero__badge-text {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--color-muted);
      letter-spacing: 0.5px;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-size: 40px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--color-heading);
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--color-muted);
      margin-bottom: 36px;
      max-width: 340px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--color-cta) 0%, var(--color-accent) 100%);
      border: none;
      padding: 16px 40px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(123, 94, 167, 0.25);
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(123, 94, 167, 0.35);
    }

    .hero__features {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .hero__feature {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--color-card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(155, 126, 200, 0.12);
      border-radius: 12px;
      padding: 14px 20px;
    }

    .hero__feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(155, 126, 200, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hero__feature-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--color-accent);
      fill: none;
      stroke-width: 1.5;
    }

    .hero__feature-text {
      font-size: 13px;
      font-weight: 400;
      color: var(--color-text);
    }

    .hero__feature-text strong {
      font-weight: 600;
      color: var(--color-heading);
    }

    @media (min-width: 768px) {
      .hero {
        padding: 80px 48px;
      }

      .hero__title {
        font-size: 52px;
      }

      .hero__subtitle {
        font-size: 18px;
        max-width: 460px;
      }

      .hero__features {
        flex-direction: row;
        max-width: 600px;
        gap: 16px;
      }

      .hero__feature {
        flex: 1;
        flex-direction: column;
        text-align: center;
        padding: 20px 16px;
      }
    }

    @media (min-width: 1440px) {
      .hero__title {
        font-size: 68px;
      }

      .hero__subtitle {
        font-size: 20px;
        max-width: 560px;
      }

      .hero__cta {
        font-size: 17px;
        padding: 20px 52px;
        border-radius: 14px;
      }

      .hero__features {
        max-width: 800px;
        gap: 20px;
      }

      .hero__feature {
        padding: 24px 20px;
        border-radius: 16px;
      }

      .hero__feature-text {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__badge">
      <span class="hero__badge-dot"></span>
      <span class="hero__badge-text">Набор открыт</span>
    </div>

    <h1 class="hero__title">Тишина внутри</h1>
    <p class="hero__subtitle">
      8 недель осознанной практики. Мягкий путь к себе — без эзотерики, без давления, в своём темпе.
    </p>

    <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>

    <div class="hero__features">
      <div class="hero__feature">
        <div class="hero__feature-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span class="hero__feature-text"><strong>8 недель</strong> пошагового курса</span>
      </div>
      <div class="hero__feature">
        <div class="hero__feature-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <span class="hero__feature-text"><strong>32 практики</strong> аудио и видео</span>
      </div>
      <div class="hero__feature">
        <div class="hero__feature-icon">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <span class="hero__feature-text"><strong>Поддержка</strong> в чате участников</span>
      </div>
    </div>
  </section>
</body>
</html>
