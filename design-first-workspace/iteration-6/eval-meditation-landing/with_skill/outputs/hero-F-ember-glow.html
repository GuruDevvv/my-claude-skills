<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant F: Ember Glow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700&family=Commissioner:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #1c1017;
      --color-text: #c8b8ae;
      --color-heading: #f0e4da;
      --color-accent: #d4704e;
      --color-accent-soft: #e8956e;
      --color-warm: #c4855a;
      --color-muted: #7d6b62;
      --color-card: rgba(212, 112, 78, 0.06);
      --font-heading: 'Unbounded', sans-serif;
      --font-body: 'Commissioner', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 24px 40px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(212, 112, 78, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero__ember {
      width: 56px;
      height: 56px;
      position: relative;
      margin-bottom: 36px;
    }

    .hero__ember-ring {
      width: 100%;
      height: 100%;
      border: 1.5px solid rgba(212, 112, 78, 0.4);
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite;
    }

    .hero__ember-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      background: var(--color-accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(212, 112, 78, 0.4);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .hero__title {
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--color-heading);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--color-muted);
      margin-bottom: 40px;
      max-width: 320px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-bg);
      background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-soft) 100%);
      border: none;
      padding: 16px 40px;
      border-radius: 32px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 24px rgba(212, 112, 78, 0.3);
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(212, 112, 78, 0.4);
    }

    .hero__promise {
      margin-top: 48px;
      padding: 20px 24px;
      background: var(--color-card);
      border: 1px solid rgba(212, 112, 78, 0.1);
      border-radius: 16px;
      max-width: 360px;
      width: 100%;
    }

    .hero__promise-text {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--color-text);
      font-style: italic;
    }

    .hero__tags {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .hero__tag {
      font-size: 11px;
      font-weight: 400;
      color: var(--color-muted);
      background: rgba(212, 112, 78, 0.08);
      border: 1px solid rgba(212, 112, 78, 0.12);
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    @media (min-width: 768px) {
      .hero {
        padding: 80px 48px;
      }

      .hero::before {
        width: 500px;
        height: 500px;
      }

      .hero__ember {
        width: 64px;
        height: 64px;
      }

      .hero__title {
        font-size: 48px;
      }

      .hero__subtitle {
        font-size: 17px;
        max-width: 460px;
      }

      .hero__promise {
        max-width: 480px;
        padding: 24px 32px;
      }

      .hero__promise-text {
        font-size: 15px;
      }
    }

    @media (min-width: 1440px) {
      .hero::before {
        width: 700px;
        height: 700px;
      }

      .hero__ember {
        width: 72px;
        height: 72px;
        margin-bottom: 44px;
      }

      .hero__title {
        font-size: 64px;
      }

      .hero__subtitle {
        font-size: 19px;
        max-width: 560px;
      }

      .hero__cta {
        font-size: 15px;
        padding: 20px 52px;
        border-radius: 36px;
      }

      .hero__promise {
        max-width: 580px;
        border-radius: 20px;
      }

      .hero__promise-text {
        font-size: 16px;
      }

      .hero__tag {
        font-size: 12px;
        padding: 8px 18px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__ember">
      <div class="hero__ember-ring"></div>
      <div class="hero__ember-core"></div>
    </div>

    <h1 class="hero__title">Тишина внутри</h1>
    <p class="hero__subtitle">
      8 недель осознанной практики. Курс медитации для тех, кто устал от шума — внешнего и внутреннего.
    </p>

    <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>

    <div class="hero__promise">
      <p class="hero__promise-text">
        «Не нужно убегать от мыслей. Нужно научиться сидеть рядом с ними — спокойно, без спешки, без оценки.»
      </p>
    </div>

    <div class="hero__tags">
      <span class="hero__tag">8 недель</span>
      <span class="hero__tag">32 практики</span>
      <span class="hero__tag">Онлайн</span>
      <span class="hero__tag">В своём темпе</span>
      <span class="hero__tag">Чат поддержки</span>
    </div>
  </section>
</body>
</html>
