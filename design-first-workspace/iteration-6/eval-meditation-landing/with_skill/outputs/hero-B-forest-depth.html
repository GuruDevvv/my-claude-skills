<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant B: Forest Depth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #1a2318;
      --color-bg-light: #243023;
      --color-text: #d4cfc5;
      --color-heading: #e8e2d6;
      --color-accent: #7fa870;
      --color-accent-muted: #5c8a4e;
      --color-gold: #c8a96e;
      --color-muted: #8a8478;
      --font-heading: 'Merriweather', serif;
      --font-body: 'Montserrat', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 24px 40px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 40%;
      background: linear-gradient(135deg, rgba(127, 168, 112, 0.08) 0%, rgba(200, 169, 110, 0.05) 100%);
      pointer-events: none;
    }

    .hero__content {
      position: relative;
      z-index: 1;
    }

    .hero__tag {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--color-accent);
      border: 1px solid rgba(127, 168, 112, 0.3);
      padding: 6px 16px;
      margin-bottom: 28px;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-size: 38px;
      font-weight: 900;
      line-height: 1.2;
      color: var(--color-heading);
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 400;
      font-style: italic;
      color: var(--color-gold);
      margin-bottom: 32px;
      max-width: 320px;
    }

    .hero__description {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--color-muted);
      margin-bottom: 36px;
      max-width: 360px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-bg);
      background: var(--color-accent);
      border: none;
      padding: 16px 36px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .hero__cta:hover {
      background: var(--color-accent-muted);
      transform: translateY(-1px);
    }

    .hero__stats {
      margin-top: 48px;
      display: flex;
      gap: 32px;
    }

    .hero__stat-number {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--color-heading);
      display: block;
    }

    .hero__stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .hero__visual {
      display: none;
    }

    @media (min-width: 768px) {
      .hero {
        flex-direction: row;
        align-items: center;
        padding: 60px 48px;
        gap: 60px;
      }

      .hero__content {
        flex: 1;
        max-width: 50%;
      }

      .hero__visual {
        display: flex;
        flex: 1;
        align-items: center;
        justify-content: center;
      }

      .hero__visual-circle {
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 40%, var(--color-bg-light) 0%, var(--color-bg) 70%);
        border: 1px solid rgba(127, 168, 112, 0.15);
        position: relative;
      }

      .hero__visual-circle::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 1px solid rgba(200, 169, 110, 0.2);
        transform: translate(-50%, -50%);
      }

      .hero__visual-circle::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        background: var(--color-gold);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.6;
      }

      .hero__title {
        font-size: 48px;
      }

      .hero__subtitle {
        font-size: 20px;
        max-width: 400px;
      }

      .hero__description {
        max-width: 420px;
      }
    }

    @media (min-width: 1440px) {
      .hero {
        padding: 80px 120px;
        gap: 100px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .hero__title {
        font-size: 64px;
      }

      .hero__subtitle {
        font-size: 24px;
        max-width: 500px;
      }

      .hero__description {
        font-size: 16px;
        max-width: 500px;
      }

      .hero__cta {
        font-size: 15px;
        padding: 18px 44px;
      }

      .hero__stat-number {
        font-size: 36px;
      }

      .hero__visual-circle {
        width: 380px;
        height: 380px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__content">
      <span class="hero__tag">Онлайн-курс</span>
      <h1 class="hero__title">Тишина внутри</h1>
      <p class="hero__subtitle">8 недель осознанной практики</p>
      <p class="hero__description">
        Пространство, где суета растворяется. Курс медитации, который учит слышать
        себя — не через усилие, а через мягкое внимание.
      </p>
      <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
      <div class="hero__stats">
        <div class="hero__stat">
          <span class="hero__stat-number">8</span>
          <span class="hero__stat-label">Недель</span>
        </div>
        <div class="hero__stat">
          <span class="hero__stat-number">32</span>
          <span class="hero__stat-label">Практики</span>
        </div>
        <div class="hero__stat">
          <span class="hero__stat-number">∞</span>
          <span class="hero__stat-label">Доступ</span>
        </div>
      </div>
    </div>
    <div class="hero__visual">
      <div class="hero__visual-circle"></div>
    </div>
  </section>
</body>
</html>
