<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant A: Warm Mist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #faf6f1;
      --color-text: #3d3530;
      --color-heading: #5a3e36;
      --color-accent: #c49a6c;
      --color-accent-light: #e8d5be;
      --color-cta: #8b5e3c;
      --color-cta-hover: #6d4a2f;
      --color-muted: #9b8a7c;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Raleway', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 24px 40px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(196, 154, 108, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero__symbol {
      width: 48px;
      height: 48px;
      border: 1.5px solid var(--color-accent);
      border-radius: 50%;
      margin-bottom: 32px;
      position: relative;
      opacity: 0.7;
    }

    .hero__symbol::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--color-accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .hero__label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 24px;
    }

    .hero__title {
      font-family: var(--font-heading);
      font-size: 42px;
      font-weight: 400;
      line-height: 1.15;
      color: var(--color-heading);
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .hero__subtitle {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      color: var(--color-muted);
      margin-bottom: 40px;
      max-width: 340px;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      background: var(--color-cta);
      border: none;
      padding: 16px 40px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .hero__cta:hover {
      background: var(--color-cta-hover);
      transform: translateY(-1px);
    }

    .hero__details {
      margin-top: 32px;
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .hero__detail {
      font-size: 13px;
      font-weight: 400;
      color: var(--color-muted);
      letter-spacing: 0.5px;
    }

    .hero__divider {
      width: 1px;
      height: 16px;
      background: var(--color-accent-light);
    }

    .hero__decoration {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--color-accent-light), transparent);
    }

    @media (min-width: 768px) {
      .hero {
        padding: 80px 48px 60px;
      }

      .hero__symbol {
        width: 56px;
        height: 56px;
        margin-bottom: 40px;
      }

      .hero__title {
        font-size: 56px;
      }

      .hero__subtitle {
        font-size: 24px;
        max-width: 450px;
      }

      .hero__cta {
        font-size: 15px;
        padding: 18px 48px;
      }

      .hero__details {
        gap: 32px;
      }

      .hero__detail {
        font-size: 14px;
      }
    }

    @media (min-width: 1440px) {
      .hero__title {
        font-size: 72px;
      }

      .hero__subtitle {
        font-size: 28px;
        max-width: 550px;
      }

      .hero__label {
        font-size: 13px;
        letter-spacing: 4px;
      }

      .hero__cta {
        font-size: 16px;
        padding: 20px 56px;
      }

      .hero__decoration {
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__symbol"></div>
    <p class="hero__label">Онлайн-курс медитации</p>
    <h1 class="hero__title">Тишина внутри</h1>
    <p class="hero__subtitle">8 недель осознанной практики</p>
    <a href="#" class="hero__cta">Начать путь — 3 900 ₽</a>
    <div class="hero__details">
      <span class="hero__detail">8 недель</span>
      <span class="hero__divider"></span>
      <span class="hero__detail">Онлайн</span>
      <span class="hero__divider"></span>
      <span class="hero__detail">В своём темпе</span>
    </div>
    <div class="hero__decoration"></div>
  </section>
</body>
</html>
