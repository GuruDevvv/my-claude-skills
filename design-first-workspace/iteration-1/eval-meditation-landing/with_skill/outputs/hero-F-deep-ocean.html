<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant F: Deep Ocean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0c1821;
      --color-surface: #132430;
      --color-text: #e0e8ee;
      --color-text-soft: #8aa0b0;
      --color-teal: #5ab3a8;
      --color-teal-glow: rgba(90, 179, 168, 0.15);
      --color-teal-dark: #3d8a80;
      --color-warm: #d4a574;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Work Sans', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated wave lines */
    .waves {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      pointer-events: none;
      overflow: hidden;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: -10%;
      width: 120%;
      height: 100%;
      opacity: 0.06;
    }

    .wave svg {
      width: 100%;
      height: auto;
      position: absolute;
      bottom: 0;
    }

    .wave--1 { animation: sway 8s ease-in-out infinite; }
    .wave--2 { animation: sway 10s ease-in-out infinite reverse; opacity: 0.04; bottom: -10px; }

    @keyframes sway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(3%); }
    }

    /* Glowing dot */
    .glow-dot {
      position: absolute;
      top: 25%;
      right: 15%;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-teal-glow), transparent 70%);
      animation: pulse-glow 5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .hero__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero__logo {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 0.9rem;
      color: var(--color-teal);
      letter-spacing: 0.05em;
    }

    .hero__tag {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-warm);
      padding: 0.35rem 0.8rem;
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 3px;
    }

    .hero__center {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 0;
    }

    .hero__kicker {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-teal);
      margin-bottom: 1.5rem;
    }

    .hero__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 3.2rem;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .hero__title-sub {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: 2.2rem;
      color: var(--color-teal);
      margin-bottom: 1.5rem;
    }

    .hero__subtitle {
      font-weight: 300;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--color-text-soft);
      max-width: 300px;
      margin-bottom: 2.5rem;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 1rem 2.5rem;
      background: var(--color-teal);
      color: var(--color-bg);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--color-teal-glow);
    }

    .hero__cta:hover {
      background: var(--color-teal-dark);
      box-shadow: 0 6px 30px rgba(90, 179, 168, 0.25);
      transform: translateY(-2px);
    }

    .hero__price {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--color-text-soft);
      font-weight: 300;
    }

    /* Bottom bar */
    .hero__bottom {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(90, 179, 168, 0.15);
    }

    .hero__instructor-block {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .hero__instructor-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--color-teal);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.7rem;
      color: var(--color-teal);
    }

    .hero__instructor-name {
      font-size: 0.8rem;
      font-weight: 400;
    }

    .hero__instructor-exp {
      font-size: 0.7rem;
      color: var(--color-text-soft);
      font-weight: 300;
    }

    .hero__scroll-hint {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-text-soft);
      writing-mode: vertical-rl;
      animation: bobDown 2s ease-in-out infinite;
    }

    @keyframes bobDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    @media (min-width: 768px) {
      .hero {
        padding: 2.5rem 4rem;
      }
      .hero__title {
        font-size: 5rem;
      }
      .hero__title-sub {
        font-size: 3.2rem;
      }
      .hero__subtitle {
        font-size: 1.05rem;
        max-width: 420px;
      }
      .glow-dot {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="glow-dot"></div>

    <div class="waves">
      <div class="wave wave--1">
        <svg viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 80C240 20 480 140 720 80C960 20 1200 140 1440 80V200H0Z" fill="#5ab3a8"/>
        </svg>
      </div>
      <div class="wave wave--2">
        <svg viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 100C200 40 440 160 720 100C1000 40 1240 160 1440 100V200H0Z" fill="#5ab3a8"/>
        </svg>
      </div>
    </div>

    <div class="hero__header">
      <span class="hero__logo">Тишина</span>
      <span class="hero__tag">Курс</span>
    </div>

    <div class="hero__center">
      <p class="hero__kicker">Медитация &middot; 8 недель</p>
      <h1 class="hero__title">Тишина</h1>
      <p class="hero__title-sub">внутри</p>
      <p class="hero__subtitle">Курс медитации для тех, кто устал бежать. Глубокое погружение в практику — без мистики, с теплом и заботой.</p>
      <a href="#" class="hero__cta">Начать путь</a>
      <p class="hero__price">3 900 руб. за полный курс</p>
    </div>

    <div class="hero__bottom">
      <div class="hero__instructor-block">
        <div class="hero__instructor-dot">АС</div>
        <div>
          <p class="hero__instructor-name">Анна Светлова</p>
          <p class="hero__instructor-exp">10 лет практики</p>
        </div>
      </div>
      <span class="hero__scroll-hint">scroll</span>
    </div>
  </section>
</body>
</html>
