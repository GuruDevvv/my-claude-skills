<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant A: Warm Sand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #f5ede3;
      --color-bg-warm: #ebe0d0;
      --color-text: #3d2e22;
      --color-text-soft: #6b5a4e;
      --color-accent: #c4956a;
      --color-accent-deep: #a37650;
      --color-white: #fffcf8;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Nunito Sans', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      position: relative;
    }

    /* Subtle warm gradient overlay */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(196, 149, 106, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Floating circle — meditation symbol */
    .circle-breath {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1.5px solid var(--color-accent);
      margin-bottom: 2.5rem;
      animation: breathe 6s ease-in-out infinite;
      position: relative;
    }

    .circle-breath::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--color-accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    .hero__tag {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent-deep);
      margin-bottom: 1.25rem;
    }

    .hero__title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 2.8rem;
      line-height: 1.15;
      color: var(--color-text);
      margin-bottom: 1.25rem;
    }

    .hero__subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--color-text-soft);
      max-width: 320px;
      margin: 0 auto 2rem;
    }

    .hero__cta {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      padding: 1rem 2.5rem;
      background: var(--color-accent);
      color: var(--color-white);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .hero__cta:hover {
      background: var(--color-accent-deep);
      transform: translateY(-2px);
    }

    .hero__price {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--color-text-soft);
      font-weight: 300;
    }

    .hero__instructor {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(163, 118, 80, 0.2);
    }

    .hero__instructor-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--color-text);
    }

    .hero__instructor-desc {
      font-size: 0.8rem;
      color: var(--color-text-soft);
      font-weight: 300;
      margin-top: 0.3rem;
    }

    @media (min-width: 768px) {
      .hero__title {
        font-size: 4rem;
      }
      .hero__subtitle {
        font-size: 1.15rem;
        max-width: 440px;
      }
      .circle-breath {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="circle-breath"></div>
    <p class="hero__tag">Онлайн-курс медитации</p>
    <h1 class="hero__title">Тишина внутри</h1>
    <p class="hero__subtitle">8-недельный курс медитации для тех, кто устал бежать</p>
    <a href="#" class="hero__cta">Начать путь</a>
    <p class="hero__price">3 900 руб.</p>
    <div class="hero__instructor">
      <p class="hero__instructor-name">Анна Светлова</p>
      <p class="hero__instructor-desc">10 лет практики медитации</p>
    </div>
  </section>
</body>
</html>
