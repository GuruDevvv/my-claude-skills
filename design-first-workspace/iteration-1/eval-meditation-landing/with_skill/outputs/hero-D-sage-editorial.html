<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тишина внутри — Variant D: Sage Editorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #f2f0eb;
      --color-text: #2a2a2a;
      --color-text-soft: #7a7a72;
      --color-sage: #8a9a7b;
      --color-sage-deep: #5e7050;
      --color-sage-light: #d5dece;
      --color-cream: #faf8f4;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-sans: 'Manrope', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 1.5rem;
    }

    /* Top bar */
    .hero__top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-sage-light);
    }

    .hero__brand {
      font-family: var(--font-serif);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .hero__format {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-sage-deep);
    }

    /* Main content — editorial centered */
    .hero__body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 0;
    }

    .hero__overline {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--color-sage);
      margin-bottom: 2rem;
    }

    .hero__title {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 2.4rem;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .hero__title-accent {
      display: block;
      font-style: italic;
      color: var(--color-sage-deep);
    }

    .hero__rule {
      width: 1px;
      height: 40px;
      background: var(--color-sage);
      margin: 1.5rem auto;
    }

    .hero__subtitle {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--color-text-soft);
      max-width: 300px;
    }

    .hero__cta-block {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .hero__cta {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem 3rem;
      background: var(--color-sage-deep);
      color: var(--color-cream);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .hero__cta:hover {
      background: var(--color-text);
    }

    .hero__price {
      font-size: 0.8rem;
      color: var(--color-text-soft);
      font-weight: 300;
    }

    /* Bottom bar */
    .hero__bottom {
      border-top: 1px solid var(--color-sage-light);
      padding-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .hero__instructor-info {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.8rem;
      color: var(--color-text-soft);
    }

    .hero__weeks {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-sage);
    }

    /* Corner decorative brackets */
    .hero__corner {
      position: fixed;
      width: 20px;
      height: 20px;
      border-color: var(--color-sage-light);
      border-style: solid;
      pointer-events: none;
    }
    .hero__corner--tl { top: 1rem; left: 1rem; border-width: 1px 0 0 1px; }
    .hero__corner--tr { top: 1rem; right: 1rem; border-width: 1px 1px 0 0; }
    .hero__corner--bl { bottom: 1rem; left: 1rem; border-width: 0 0 1px 1px; }
    .hero__corner--br { bottom: 1rem; right: 1rem; border-width: 0 1px 1px 0; }

    @media (min-width: 768px) {
      .hero {
        padding: 2.5rem 4rem;
      }
      .hero__title {
        font-size: 3.8rem;
      }
      .hero__subtitle {
        font-size: 1.1rem;
        max-width: 400px;
      }
      .hero__corner {
        width: 30px;
        height: 30px;
      }
      .hero__corner--tl { top: 2rem; left: 2rem; }
      .hero__corner--tr { top: 2rem; right: 2rem; }
      .hero__corner--bl { bottom: 2rem; left: 2rem; }
      .hero__corner--br { bottom: 2rem; right: 2rem; }
    }
  </style>
</head>
<body>
  <div class="hero__corner hero__corner--tl"></div>
  <div class="hero__corner hero__corner--tr"></div>
  <div class="hero__corner hero__corner--bl"></div>
  <div class="hero__corner hero__corner--br"></div>

  <section class="hero">
    <div class="hero__top">
      <span class="hero__brand">Тишина внутри</span>
      <span class="hero__format">Онлайн-курс</span>
    </div>

    <div class="hero__body">
      <p class="hero__overline">Медитация</p>
      <h1 class="hero__title">
        Тишина
        <span class="hero__title-accent">внутри</span>
      </h1>
      <div class="hero__rule"></div>
      <p class="hero__subtitle">Курс для тех, кто устал бежать. Восемь недель мягкой практики, чтобы услышать себя заново.</p>
      <div class="hero__cta-block">
        <a href="#" class="hero__cta">Начать путь</a>
        <span class="hero__price">3 900 руб.</span>
      </div>
    </div>

    <div class="hero__bottom">
      <span class="hero__instructor-info">Анна Светлова — 10 лет практики</span>
      <span class="hero__weeks">8 недель</span>
    </div>
  </section>
</body>
</html>
