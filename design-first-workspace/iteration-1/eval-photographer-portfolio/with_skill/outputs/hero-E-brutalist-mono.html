<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photographer Portfolio — Variant E: Brutalist Mono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Fira+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #f2f2f0;
      --color-text: #0a0a0a;
      --color-muted: #767672;
      --color-accent: #e0ddd5;
      --font-heading: 'Unbounded', sans-serif;
      --font-body: 'Fira Sans', sans-serif;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px 24px;
    }

    .nav__logo {
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .nav__menu {
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: var(--color-text);
    }

    /* HERO */
    .hero {
      padding: 20px 24px 40px;
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
    }

    .hero__overline {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 12px;
    }

    .hero__name {
      font-family: var(--font-heading);
      font-size: 38px;
      font-weight: 700;
      line-height: 1.0;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero__name span {
      display: block;
      font-weight: 300;
      font-size: 32px;
    }

    .hero__divider {
      width: 100%;
      height: 2px;
      background: var(--color-text);
      margin: 20px 0;
    }

    /* Photo blocks — offset asymmetric */
    .hero__photos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 32px;
    }

    .hero__photo {
      aspect-ratio: 3/4;
    }

    .hero__photo--offset {
      margin-top: 32px;
    }

    .hp-1 { background: #4a4944; }
    .hp-2 { background: #7a7870; }
    .hp-3 { background: #5e5d56; }

    .hero__meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
    }

    .hero__tagline {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      font-style: italic;
      color: var(--color-muted);
      max-width: 200px;
      line-height: 1.6;
    }

    .hero__cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-heading);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text);
      text-decoration: none;
      padding: 12px 0;
      border-bottom: 2px solid var(--color-text);
      transition: gap 0.3s;
    }

    .hero__cta:hover {
      gap: 16px;
    }

    .hero__cta svg {
      width: 16px;
      height: 16px;
    }

    /* Number overlay */
    .hero__number {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: var(--font-heading);
      font-size: 80px;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
      pointer-events: none;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .nav {
        padding: 28px 48px;
      }

      .hero {
        flex-direction: row;
        flex-wrap: wrap;
        padding: 20px 48px 48px;
        gap: 40px;
      }

      .hero__text {
        flex: 0 0 40%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero__name {
        font-size: 48px;
      }

      .hero__name span {
        font-size: 40px;
      }

      .hero__photos {
        flex: 1;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 0;
      }

      .hero__meta {
        width: 100%;
      }

      .hero__number {
        font-size: 140px;
        bottom: 30px;
        right: 48px;
      }
    }

    @media (min-width: 1440px) {
      .nav {
        padding: 32px 80px;
      }

      .hero {
        padding: 20px 80px 60px;
        gap: 60px;
      }

      .hero__text {
        flex: 0 0 35%;
      }

      .hero__overline {
        font-size: 13px;
        margin-bottom: 16px;
      }

      .hero__name {
        font-size: 68px;
        margin-bottom: 12px;
      }

      .hero__name span {
        font-size: 56px;
      }

      .hero__divider {
        height: 3px;
        margin: 28px 0;
      }

      .hero__photos {
        gap: 12px;
      }

      .hero__photo--offset {
        margin-top: 48px;
      }

      .hero__tagline {
        font-size: 16px;
        max-width: 300px;
      }

      .hero__number {
        font-size: 200px;
        bottom: 40px;
        right: 80px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav__logo">A.V.</div>
    <div class="nav__menu">&equiv;</div>
  </nav>

  <section class="hero">
    <div class="hero__text">
      <p class="hero__overline">Фотограф / Москва</p>
      <h1 class="hero__name">
        Алексей
        <span>Волков</span>
      </h1>
      <div class="hero__divider"></div>
      <p class="hero__tagline">Бетон. Стекло. Свет между ними.</p>
      <a href="#" class="hero__cta">
        Портфолио
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </a>
    </div>

    <div class="hero__photos">
      <div class="hero__photo hp-1"></div>
      <div class="hero__photo hero__photo--offset hp-2"></div>
      <div class="hero__photo hp-3"></div>
    </div>

    <div class="hero__meta">
      <span class="hero__overline">Архитектура &middot; Город</span>
      <span class="hero__overline">2019 &mdash; 2024</span>
    </div>
  </section>

  <div class="hero__number">01</div>
</body>
</html>
