<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мука и Время</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background-color: #FAFAF7;
    color: #3A3A35;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 24px;
    position: relative;
  }

  .hero-inner {
    max-width: 800px;
    width: 100%;
  }

  /* Thin top line accent */
  .hero-line {
    width: 1px;
    height: 60px;
    background: #C8C3B8;
    margin: 0 auto 40px;
  }

  .hero-name {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #9C958A;
    margin-bottom: 48px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 40px;
    line-height: 1.2;
    color: #3A3A35;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .hero-em {
    font-weight: 400;
    font-style: normal;
    color: #8B7D6B;
  }

  .hero-dash {
    display: block;
    width: 32px;
    height: 1px;
    background: #C8C3B8;
    margin: 32px auto;
  }

  .hero-text {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.9;
    color: #7A756C;
    max-width: 500px;
    margin: 0 auto 48px;
  }

  .hero-cta {
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #3A3A35;
    background: transparent;
    border: 1px solid #C8C3B8;
    padding: 14px 36px;
    text-decoration: none;
    transition: all 0.4s ease;
  }

  .hero-cta:hover {
    background: #3A3A35;
    color: #FAFAF7;
    border-color: #3A3A35;
  }

  /* Bottom minimal detail */
  .hero-bottom {
    margin-top: 72px;
    display: flex;
    justify-content: center;
    gap: 48px;
  }

  .hero-bottom-item {
    text-align: center;
  }

  .hero-bottom-label {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B0A999;
  }

  .hero-bottom-value {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 24px;
    color: #7A756C;
    margin-top: 4px;
  }

  .hero-bottom-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #C8C3B8;
    align-self: center;
  }

  /* Tablet */
  @media (min-width: 768px) {
    .hero { padding: 100px 48px; }
    .hero-title { font-size: 54px; }
    .hero-text { font-size: 16px; max-width: 520px; }
    .hero-line { height: 80px; }
    .hero-bottom { gap: 64px; }
  }

  /* Desktop */
  @media (min-width: 1440px) {
    .hero-inner { max-width: 860px; }
    .hero-title { font-size: 68px; }
    .hero-text { font-size: 17px; max-width: 540px; }
    .hero-name { font-size: 14px; letter-spacing: 8px; }
    .hero-line { height: 100px; margin-bottom: 56px; }
    .hero-cta { padding: 16px 44px; font-size: 14px; }
    .hero-bottom-value { font-size: 28px; }
  }
</style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-line"></div>
      <div class="hero-name">Мука и Время</div>

      <h1 class="hero-title">
        Выпечка<br>
        <em class="hero-em">с душой</em>
      </h1>

      <span class="hero-dash"></span>

      <p class="hero-text">
        Хлеб на закваске. Торты на заказ. Выпечка, в которой каждый
        ингредиент на своём месте. Мы не торопимся — потому что
        настоящий вкус требует времени.
      </p>

      <a href="#order" class="hero-cta">Заказать торт</a>

      <div class="hero-bottom">
        <div class="hero-bottom-item">
          <div class="hero-bottom-label">Закваска</div>
          <div class="hero-bottom-value">24ч</div>
        </div>
        <div class="hero-bottom-dot"></div>
        <div class="hero-bottom-item">
          <div class="hero-bottom-label">Вручную</div>
          <div class="hero-bottom-value">100%</div>
        </div>
        <div class="hero-bottom-dot"></div>
        <div class="hero-bottom-item">
          <div class="hero-bottom-label">Опыт</div>
          <div class="hero-bottom-value">7 лет</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
