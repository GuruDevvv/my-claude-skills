<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мука и Время — Выпечка с душой</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lora', serif;
    background-color: #FDF6EE;
    color: #3D2B1F;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px;
    position: relative;
  }

  /* Subtle radial warm glow */
  .hero::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(210, 160, 100, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    max-width: 800px;
    width: 100%;
  }

  .hero-badge {
    display: inline-block;
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #A0755A;
    border: 1px solid #D4B896;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 32px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 42px;
    line-height: 1.15;
    color: #3D2B1F;
    margin-bottom: 8px;
  }

  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 26px;
    color: #8B6F4E;
    margin-bottom: 28px;
  }

  .hero-divider {
    width: 60px;
    height: 1px;
    background: #D4B896;
    margin: 0 auto 28px;
  }

  .hero-text {
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.75;
    color: #6B5341;
    max-width: 520px;
    margin: 0 auto 40px;
  }

  .hero-cta {
    display: inline-block;
    font-family: 'Lora', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #FDF6EE;
    background: #8B6244;
    border: none;
    padding: 16px 40px;
    border-radius: 4px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
  }

  .hero-cta:hover {
    background: #6F4E35;
    transform: translateY(-1px);
  }

  .hero-details {
    margin-top: 48px;
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .hero-detail {
    text-align: center;
  }

  .hero-detail-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: #8B6244;
  }

  .hero-detail-label {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #A0886E;
    margin-top: 4px;
  }

  /* Tablet */
  @media (min-width: 768px) {
    .hero-title { font-size: 58px; }
    .hero-subtitle { font-size: 30px; }
    .hero-text { font-size: 17px; max-width: 540px; }
    .hero-details { gap: 56px; }
  }

  /* Desktop */
  @media (min-width: 1440px) {
    .hero-inner { max-width: 900px; }
    .hero-title { font-size: 72px; }
    .hero-subtitle { font-size: 34px; }
    .hero-text { font-size: 18px; max-width: 560px; }
    .hero-badge { font-size: 13px; letter-spacing: 4px; }
    .hero-cta { padding: 18px 48px; font-size: 16px; }
  }
</style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <span class="hero-badge">Ремесленная пекарня</span>
      <h1 class="hero-title">Мука и Время</h1>
      <p class="hero-subtitle">Выпечка с душой</p>
      <div class="hero-divider"></div>
      <p class="hero-text">
        Мы печём хлеб на закваске, создаём торты на заказ и готовим выпечку,
        в которую вложены настоящие ингредиенты, мастерство и время.
        Каждый торт — это история, рассказанная вкусом.
      </p>
      <a href="#order" class="hero-cta">Заказать торт</a>
      <div class="hero-details">
        <div class="hero-detail">
          <div class="hero-detail-number">7+</div>
          <div class="hero-detail-label">Лет опыта</div>
        </div>
        <div class="hero-detail">
          <div class="hero-detail-number">1200+</div>
          <div class="hero-detail-label">Тортов</div>
        </div>
        <div class="hero-detail">
          <div class="hero-detail-number">100%</div>
          <div class="hero-detail-label">Натурально</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
