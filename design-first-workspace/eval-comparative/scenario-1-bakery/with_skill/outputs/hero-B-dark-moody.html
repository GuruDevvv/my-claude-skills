<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мука и Время — Каждый торт — история</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #1A1412;
    color: #F0E6DA;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 20px;
  }

  /* Top bar */
  .hero-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }

  .hero-logo {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C8A882;
  }

  .hero-nav-link {
    font-size: 13px;
    font-weight: 300;
    color: #8C7B6B;
    text-decoration: none;
    letter-spacing: 1px;
  }

  /* Main content — stacked on mobile, split on desktop */
  .hero-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .hero-left {
    flex: 1;
  }

  .hero-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8C7B6B;
    margin-bottom: 20px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 44px;
    line-height: 1.05;
    color: #F0E6DA;
    margin-bottom: 12px;
  }

  .hero-title-accent {
    color: #D4A574;
  }

  .hero-tagline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 20px;
    color: #8C7B6B;
    margin-bottom: 32px;
  }

  /* Image placeholder — dark moody food card */
  .hero-image-block {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, #2A201A 0%, #1A1412 50%, #2E2218 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hero-image-block::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(212, 165, 116, 0.12) 0%, transparent 60%);
  }

  .hero-image-text {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: rgba(212, 165, 116, 0.15);
    text-align: center;
    z-index: 1;
  }

  .hero-description {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.8;
    color: #A09080;
    max-width: 520px;
    margin-bottom: 36px;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .hero-cta-primary {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1A1412;
    background: #D4A574;
    padding: 16px 36px;
    border: none;
    border-radius: 2px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .hero-cta-primary:hover {
    background: #C8945F;
  }

  .hero-cta-secondary {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1px;
    color: #8C7B6B;
    text-decoration: none;
    border-bottom: 1px solid #3D3028;
    padding-bottom: 2px;
    transition: color 0.3s, border-color 0.3s;
  }

  .hero-cta-secondary:hover {
    color: #D4A574;
    border-color: #D4A574;
  }

  /* Bottom stats bar */
  .hero-stats {
    display: flex;
    gap: 40px;
    padding-top: 40px;
    border-top: 1px solid #2A201A;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .hero-stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #D4A574;
  }

  .hero-stat-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5C4F42;
    margin-top: 4px;
  }

  /* Tablet — split layout */
  @media (min-width: 768px) {
    .hero { padding: 40px 48px; }
    .hero-content {
      flex-direction: row;
      align-items: center;
      gap: 60px;
    }
    .hero-title { font-size: 56px; }
    .hero-image-block { aspect-ratio: 3 / 4; }
  }

  /* Desktop */
  @media (min-width: 1440px) {
    .hero {
      padding: 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .hero-content { gap: 80px; }
    .hero-title { font-size: 72px; }
    .hero-tagline { font-size: 24px; }
    .hero-description { font-size: 16px; max-width: 500px; }
    .hero-stats { gap: 64px; }
    .hero-stat-value { font-size: 36px; }
  }
</style>
</head>
<body>
  <section class="hero">
    <nav class="hero-nav">
      <span class="hero-logo">Мука и Время</span>
      <a href="#menu" class="hero-nav-link">Меню</a>
    </nav>

    <div class="hero-content">
      <div class="hero-left">
        <div class="hero-image-block">
          <span class="hero-image-text">🍞</span>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-label">Ремесленная пекарня</div>
        <h1 class="hero-title">
          Каждый торт —<br>
          <span class="hero-title-accent">история</span>
        </h1>
        <p class="hero-tagline">Выпечка с душой</p>
        <p class="hero-description">
          Закваска, которая зреет сутки. Крем из настоящих сливок.
          Декор, созданный вручную. Мы не торопимся — и вкус это подтверждает.
        </p>
        <div class="hero-actions">
          <a href="#order" class="hero-cta-primary">Заказать торт</a>
          <a href="#menu" class="hero-cta-secondary">Смотреть меню</a>
        </div>
      </div>
    </div>

    <div class="hero-stats">
      <div>
        <div class="hero-stat-value">24ч</div>
        <div class="hero-stat-label">Закваска</div>
      </div>
      <div>
        <div class="hero-stat-value">0</div>
        <div class="hero-stat-label">Консервантов</div>
      </div>
      <div>
        <div class="hero-stat-value">∞</div>
        <div class="hero-stat-label">Любви</div>
      </div>
    </div>
  </section>
</body>
</html>
